<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProCompta - Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full flex items-center justify-center">

  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <img src="/static/logo.png" alt="ProCompta" class="h-14 w-auto object-contain">
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 px-8 py-8">
      <h1 class="text-lg font-semibold text-slate-800 mb-6">Connexion</h1>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Email</label>
          <input type="email" name="email" required autofocus
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Mot de passe</label>
          <input type="password" name="password" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors mt-2">
          Se connecter
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-500 mt-6">ProCompta v{{ app_version }}</p>
  </div>

</body>
</html>
