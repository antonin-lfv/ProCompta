<header class="h-14 bg-slate-900 border-b border-slate-700/50 flex items-center justify-between px-6 shrink-0 z-10">

  <a href="/" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity shrink-0">
    <img src="/static/logo.png" alt="ProCompta" class="h-10 w-auto object-contain">
  </a>

  <div class="flex-1 max-w-sm mx-8"
       x-data="{ count: 0, showDelete: false, _archive: null, _del: null, _clear: null }"
       @bulk-changed.window="count = $event.detail.count; _archive = $event.detail.archive; _del = $event.detail.del; _clear = $event.detail.clear; if (!count) showDelete = false">

    <!-- Recherche (masquée quand sélection active) -->
    <form action="/documents" method="GET" x-show="count === 0">
      <div class="relative group">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
             class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input type="text" name="search" placeholder="Rechercher un document…"
               class="w-full bg-slate-800 border border-slate-700 rounded-lg pl-8 pr-8 py-1.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-colors">
        <kbd class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 px-1.5 py-0.5 rounded bg-slate-700 border border-slate-600 text-slate-400 font-mono text-[11px] group-focus-within:hidden">/</kbd>
      </div>
    </form>

    <!-- Barre d'actions groupées (remplace la recherche) -->
    <div x-show="count > 0" x-cloak class="flex items-center gap-3">
      <span class="text-sm font-medium text-slate-300 whitespace-nowrap" x-text="count + ' sélectionné' + (count > 1 ? 's' : '')"></span>
      <div class="w-px h-4 bg-slate-600 shrink-0"></div>
      <button @click="_archive?.(true)" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-300 hover:text-white transition-colors whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m8.25 4.875v4.5m0-4.5-1.875 1.875M12 12.375l1.875 1.875M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
        </svg>
        Archiver
      </button>
      <button @click="_archive?.(false)" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-300 hover:text-white transition-colors whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
        </svg>
        Désarchiver
      </button>
      <button @click="showDelete = true" class="inline-flex items-center gap-1.5 text-sm font-medium text-red-400 hover:text-red-300 transition-colors whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>
        Supprimer
      </button>
      <button @click="_clear?.()" class="p-1 rounded-lg text-slate-500 hover:text-white hover:bg-slate-700 transition-colors" title="Désélectionner tout">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Modale confirmation suppression groupée -->
    <div x-show="showDelete" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
         @keydown.escape.window="if (showDelete) showDelete = false">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-red-600">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
            </svg>
          </div>
          <div>
            <h3 class="text-base font-semibold text-slate-900">Supprimer les documents</h3>
            <p class="text-sm text-slate-500 mt-0.5" x-text="`${count} document${count > 1 ? 's' : ''} sera${count > 1 ? 'ont' : ''} supprimé${count > 1 ? 's' : ''} définitivement.`"></p>
          </div>
        </div>
        <p class="text-sm text-slate-600">Cette action est irréversible. Les fichiers associés seront également supprimés.</p>
        <div class="flex gap-3 pt-1">
          <button @click="showDelete = false" class="flex-1 px-4 py-2 text-sm font-medium rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors">
            Annuler
          </button>
          <button @click="showDelete = false; _del?.()" class="flex-1 px-4 py-2 text-sm font-medium rounded-lg bg-red-600 text-white hover:bg-red-700 transition-colors">
            Supprimer
          </button>
        </div>
      </div>
    </div>

  </div>

  <div class="flex items-center gap-1 shrink-0">

    <!-- Onboarding help button -->
    <button onclick="window.ProComptaTour && ProComptaTour.start(0)"
            title="Visite guidée de l'application"
            class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/>
      </svg>
    </button>

    <!-- Bell -->
    <div x-data="{
      open: false,
      count: 0,
      items: [],
      loaded: false,
      async init() {
        await this.fetchCount();
      },
      async fetchCount() {
        try {
          const r = await fetch('/api/notifications/unread-count');
          this.count = (await r.json()).count;
        } catch(e) {}
      },
      async fetchItems() {
        try {
          const r = await fetch('/api/notifications?read=false&limit=5');
          this.items = await r.json();
          this.loaded = true;
        } catch(e) {}
      },
      async toggle() {
        this.open = !this.open;
        if (this.open && !this.loaded) await this.fetchItems();
      },
      _dispatch(action, id) {
        window.dispatchEvent(new CustomEvent('notif-changed', {detail: {action, id}}));
      },
      async openDoc(n) {
        if (!n.read) {
          await fetch('/api/notifications/' + n.id + '/read', {method:'PATCH'});
          this._dispatch('read', n.id);
        }
        window.location.href = '/documents/' + n.document_id + '/edit?back=/notifications';
      },
      async markRead(n) {
        await fetch('/api/notifications/' + n.id + '/read', {method:'PATCH'});
        this._dispatch('read', n.id);
      },
      async markAll() {
        await fetch('/api/notifications/read-all', {method:'PATCH'});
        this._dispatch('read-all', null);
      },
      async onNotifChanged(detail) {
        await this.fetchCount();
        if (!this.loaded) return;
        if (!detail) { this.loaded = false; this.items = []; return; }
        const {action, id} = detail;
        if ((action === 'read' || action === 'delete') && id) {
          this.items = this.items.filter(i => i.id !== id);
        } else if (action === 'read-all') {
          this.items = [];
        } else if (action === 'unread') {
          await this.fetchItems();
        }
      }
    }" @click.outside="open = false" @notif-changed.window="onNotifChanged($event.detail)" class="relative">

      <button id="tour-notif-bell" @click="toggle()"
              class="relative p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
        </svg>
        <span x-show="count > 0" x-text="count > 9 ? '9+' : count"
              class="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 flex items-center justify-center bg-red-500 text-white text-[10px] font-bold rounded-full px-1 leading-none">
        </span>
      </button>

      <!-- Dropdown -->
      <div x-show="open" x-cloak
           class="absolute right-0 top-full mt-1 w-80 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50">

        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
          <span class="text-sm font-semibold text-slate-800">Notifications</span>
          <button x-show="count > 0" @click="markAll()"
                  class="text-xs text-indigo-600 hover:text-indigo-800 transition-colors">
            Tout marquer lu
          </button>
        </div>

        <div class="max-h-72 overflow-y-auto divide-y divide-slate-100">
          <template x-if="items.length === 0">
            <div class="px-4 py-6 text-center text-sm text-slate-400">
              Aucune notification non lue
            </div>
          </template>
          <template x-for="n in items" :key="n.id">
            <div class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 transition-colors">
              <span class="mt-1.5 w-2 h-2 rounded-full bg-indigo-500 shrink-0"></span>
              <div class="flex-1 min-w-0">
                <p class="text-sm text-slate-700 font-medium leading-tight" x-text="n.title"></p>
                <p class="text-xs text-slate-400 mt-0.5" x-text="n.body"></p>
                <div class="flex items-center gap-3 mt-1.5">
                  <button x-show="n.document_id" @click="openDoc(n)"
                          class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">
                    Ouvrir →
                  </button>
                  <button @click="markRead(n)" class="text-xs text-slate-400 hover:text-slate-600">
                    Marquer lu
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>

        <div class="border-t border-slate-100 px-4 py-2.5">
          <a href="/notifications" class="text-xs text-slate-500 hover:text-slate-700 transition-colors">
            Voir tout l'historique →
          </a>
        </div>
      </div>
    </div>

    <a href="/profile" title="Profil"
       class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      </svg>
      {% if current_user %}
      <span class="text-sm font-medium text-slate-300 whitespace-nowrap">{{ current_user.name }}</span>
      {% endif %}
    </a>
  </div>

</header>
