<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ProCompta{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/tailwind.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
  {% block head %}{% endblock %}
</head>
<body class="h-full flex flex-col bg-slate-50 font-sans antialiased">

  {% include "partials/navbar.html" %}

  <div
    class="relative flex flex-1 overflow-hidden"
    x-data="{
      collapsed: localStorage.getItem('procompta-sidebar') === 'true',
      toggle() {
        this.collapsed = !this.collapsed;
        localStorage.setItem('procompta-sidebar', this.collapsed);
      }
    }"
  >
    {% include "partials/sidebar.html" %}

    <!-- Bouton toggle sur la jonction sidebar / contenu -->
    <button
      @click="toggle()"
      :style="{ left: collapsed ? 'calc(4rem + 5px)' : 'calc(16rem + 5px)' }"
      :title="collapsed ? 'Ouvrir le menu' : 'Réduire le menu'"
      class="fixed top-[76px] z-30 -translate-x-1/2 transition-[left] duration-300 ease-in-out
             w-5 h-5 rounded-full bg-slate-700 border border-slate-600
             flex items-center justify-center
             text-slate-400 hover:text-white hover:bg-slate-600"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
           class="w-3 h-3 transition-transform duration-300" :class="collapsed ? 'rotate-180' : ''">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>

    <main class="flex-1 overflow-auto">
      <div class="p-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <!-- Preview Modal -->
  <div
    x-data="{
      open: false,
      loading: false,
      doc: null,
      fmt(n) { return n != null ? Number(n).toFixed(2) + ' €' : '-'; },
      fmtDate(d) { if (!d) return '-'; const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; },
      fmtSize(b) {
        if (b < 1024) return b + ' o';
        if (b < 1048576) return (b/1024).toFixed(0) + ' Ko';
        return (b/1048576).toFixed(1) + ' Mo';
      },
      catLabel(c) { return {depense:'Dépense', recette:'Recette', autre:'Autre'}[c] ?? c; },
      async load(id) {
        this.open = true;
        this.loading = true;
        this.doc = null;
        try {
          const r = await fetch('/api/documents/' + id);
          this.doc = await r.json();
        } finally {
          this.loading = false;
        }
      }
    }"
    @open-preview.window="load($event.detail.id)"
    @keydown.escape.window="open = false"
    x-show="open"
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center p-6"
  >
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" @click="open = false"></div>

    <!-- Panel -->
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">

      <!-- Loading -->
      <div x-show="loading" class="flex items-center justify-center gap-3 p-16 text-slate-400">
        <svg class="w-5 h-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-sm">Chargement…</span>
      </div>

      <template x-if="!loading && doc">
        <div class="flex flex-col overflow-hidden">

          <!-- Header -->
          <div class="flex items-start justify-between px-6 py-4 border-b border-slate-200 shrink-0">
            <div>
              <span class="inline-block px-2 py-0.5 rounded-md text-xs font-medium mb-1.5"
                    :class="{
                      'bg-red-100 text-red-700': doc.category === 'depense',
                      'bg-green-100 text-green-700': doc.category === 'recette',
                      'bg-slate-100 text-slate-600': doc.category === 'autre'
                    }"
                    x-text="catLabel(doc.category)"></span>
              <h2 class="text-lg font-bold text-slate-900" x-text="doc.title"></h2>
            </div>
            <button @click="open = false"
                    class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors ml-4 shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
              </svg>
            </button>
          </div>

          <!-- Body -->
          <div class="grid grid-cols-5 flex-1 min-h-0 divide-x divide-slate-100">

            <!-- Left : aperçu document -->
            <div class="col-span-3 bg-slate-100 flex items-center justify-center p-4 overflow-hidden">
              <template x-if="doc.mime_type && doc.mime_type.startsWith('image/')">
                <img :src="'/api/documents/' + doc.id + '/file'"
                     loading="lazy"
                     class="max-w-full max-h-[420px] object-contain rounded shadow-sm">
              </template>
              <template x-if="doc.mime_type && !doc.mime_type.startsWith('image/')">
                <iframe :src="'/api/documents/' + doc.id + '/file'"
                        class="w-full h-[420px] rounded border border-slate-200 bg-white"></iframe>
              </template>
            </div>

            <!-- Right : infos -->
            <div class="col-span-2 overflow-y-auto p-5 space-y-5">

              <!-- Dates -->
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Dates</p>
                <div class="space-y-1.5">
                  <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Document</span>
                    <span class="font-medium text-slate-800" x-text="fmtDate(doc.document_date)"></span>
                  </div>
                  <template x-if="doc.payment_date">
                    <div class="flex justify-between text-sm">
                      <span class="text-slate-500">Paiement</span>
                      <span class="font-medium text-slate-800" x-text="fmtDate(doc.payment_date)"></span>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Correspondant + Type -->
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Infos</p>
                <div class="space-y-1.5">
                  <template x-if="doc.correspondent">
                    <div class="flex justify-between text-sm">
                      <span class="text-slate-500">Correspondant</span>
                      <span class="font-medium text-slate-800 text-right" x-text="doc.correspondent.name"></span>
                    </div>
                  </template>
                  <template x-if="doc.document_type">
                    <div class="flex justify-between text-sm">
                      <span class="text-slate-500">Type</span>
                      <span class="font-medium text-slate-800" x-text="doc.document_type.name"></span>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Montants -->
              <template x-if="doc.category !== 'autre'">
                <div>
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Montants</p>
                  <div class="space-y-1.5">
                    <template x-if="doc.amount_ht != null">
                      <div class="flex justify-between text-sm">
                        <span class="text-slate-500">HT</span>
                        <span class="font-medium text-slate-800" x-text="fmt(doc.amount_ht)"></span>
                      </div>
                    </template>
                    <template x-if="doc.vat_amount != null">
                      <div class="flex justify-between text-sm">
                        <span class="text-slate-500">TVA</span>
                        <span class="font-medium text-slate-800" x-text="fmt(doc.vat_amount)"></span>
                      </div>
                    </template>
                    <div class="flex justify-between text-sm pt-1.5 border-t border-slate-100 mt-1">
                      <span class="text-slate-600 font-medium">TTC</span>
                      <div class="text-right">
                        <span class="font-bold text-slate-900"
                              x-text="doc.currency !== 'EUR' && doc.amount_ttc_eur ? fmt(doc.amount_ttc_eur) : fmt(doc.amount_ttc)"></span>
                        <template x-if="doc.currency !== 'EUR' && doc.amount_ttc_eur">
                          <p class="text-xs text-slate-400"
                             x-text="'(' + Number(doc.amount_ttc).toFixed(2) + ' ' + doc.currency + ')'"></p>
                        </template>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Tags -->
              <template x-if="doc.tags && doc.tags.length > 0">
                <div>
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Tags</p>
                  <div class="flex flex-wrap gap-1">
                    <template x-for="tag in doc.tags" :key="tag.id">
                      <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium"
                            :style="'background-color:' + tag.color + '1a; color:' + tag.color"
                            x-text="tag.name"></span>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Notes -->
              <template x-if="doc.notes">
                <div>
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Notes</p>
                  <p class="text-sm text-slate-600 whitespace-pre-wrap leading-relaxed" x-text="doc.notes"></p>
                </div>
              </template>

              <!-- Fichier -->
              <div class="text-xs text-slate-400 pt-3 border-t border-slate-100">
                <span x-text="doc.mime_type"></span>
                · <span x-text="fmtSize(doc.file_size)"></span>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="flex items-center justify-between px-6 py-3 border-t border-slate-200 bg-slate-50 shrink-0">
            <a :href="'/api/documents/' + doc.id + '/file'" target="_blank"
               class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-700 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
              </svg>
              Ouvrir le fichier
            </a>
            <a :href="'/documents/' + doc.id + '/edit'"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125" />
              </svg>
              Modifier
            </a>
          </div>

        </div>
      </template>
    </div>
  </div>

  <!-- Keyboard Shortcuts Help Modal -->
  <div
    x-data="{ open: false }"
    @toggle-shortcuts-help.window="open = !open"
    @keydown.escape.window="open = false"
    x-show="open"
    x-cloak
    class="fixed inset-0 z-[70] flex items-center justify-center p-6"
  >
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" @click="open = false"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-xs p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-sm font-semibold text-slate-800">Raccourcis clavier</h2>
        <button @click="open = false"
                class="p-1 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="space-y-2.5">
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-500">Rechercher</span>
          <kbd class="px-2 py-0.5 rounded bg-slate-100 border border-slate-200 text-xs font-mono text-slate-600">/</kbd>
        </div>
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-500">Nouveau document</span>
          <kbd class="px-2 py-0.5 rounded bg-slate-100 border border-slate-200 text-xs font-mono text-slate-600">N</kbd>
        </div>
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-500">Fermer / Annuler</span>
          <kbd class="px-2 py-0.5 rounded bg-slate-100 border border-slate-200 text-xs font-mono text-slate-600">Esc</kbd>
        </div>
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-500">Cette aide</span>
          <kbd class="px-2 py-0.5 rounded bg-slate-100 border border-slate-200 text-xs font-mono text-slate-600">?</kbd>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', function(e) {
      const tag = e.target.tagName;
      const editing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable;
      if (editing || e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.key === '/') {
        e.preventDefault();
        document.querySelector('input[name="search"]')?.focus();
      } else if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        if (window.location.pathname.startsWith('/year/')) {
          window.dispatchEvent(new CustomEvent('trigger-upload'));
        } else {
          window.location.href = '/year/{{ current_year }}';
        }
      } else if (e.key === '?') {
        window.dispatchEvent(new CustomEvent('toggle-shortcuts-help'));
      }
    });
  </script>

</body>
</html>
